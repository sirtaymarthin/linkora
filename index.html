<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#080809">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>LinkVault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#080809;color:#c8c8cc;font-family:'Inter',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
#app{min-height:100vh;display:flex;flex-direction:column}
.header{padding:48px 24px 24px;display:flex;align-items:flex-end;justify-content:space-between;position:sticky;top:0;background:#080809;z-index:10;border-bottom:1px solid #111}
.header-title{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#f0f0f0;letter-spacing:-0.02em;line-height:1}
.header-sub{font-size:10px;font-weight:500;letter-spacing:0.2em;color:#333;text-transform:uppercase;margin-bottom:6px}
.add-btn{width:44px;height:44px;border-radius:50%;background:#f0f0f0;color:#080809;border:none;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.add-btn.open{background:#1a1a1e;color:#f0f0f0;font-size:18px}
.add-form{padding:20px 24px 24px;background:#080809;border-bottom:1px solid #111}
.input-wrap{position:relative;margin-bottom:10px}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.pbadge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase}
.field{width:100%;background:#0f0f12;border:1px solid #1a1a1e;border-radius:12px;padding:14px 14px 14px 42px;font-size:14px;color:#e0e0e0;font-family:'Inter',sans-serif;-webkit-appearance:none}
.field:focus{outline:none;border-color:#333}
.field.note{padding-left:14px;font-size:13px;color:#888;margin-bottom:14px}
.field::placeholder{color:#2a2a2e}
.save-btn{width:100%;background:#f0f0f0;color:#080809;border:none;border-radius:12px;padding:14px;font-size:13px;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.filters{padding:14px 24px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters-inner{display:flex;gap:8px;padding-bottom:2px;width:max-content}
.pill{background:transparent;color:#333;border:1px solid #1a1a1e;border-radius:100px;padding:6px 14px;font-size:11px;font-family:'Inter',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.pill.active{color:#080809;border-color:transparent}
.grid{padding:20px 24px 120px;display:flex;flex-direction:column;gap:1px}
.card{background:#080809;border-bottom:1px solid #111;padding:16px 0;display:flex;gap:14px;align-items:flex-start}
.thumb{width:72px;height:72px;flex-shrink:0;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.thumb a{display:block;width:100%;height:100%}
.content{flex:1;min-width:0}
.meta{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pname{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase}
.curl{font-size:14px;font-weight:500;color:#e8e8ec;text-decoration:none;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;line-height:1.3}
.cnote{font-size:12px;color:#444;line-height:1.4;margin-bottom:8px}
.ctime{font-size:10px;color:#2a2a2e;letter-spacing:0.04em}
.actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;padding-top:2px}
.abtn{width:36px;height:36px;border-radius:10px;background:#0f0f12;border:1px solid #1a1a1e;color:#555;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;font-size:16px}
.wa{background:#0a1f0f;border-color:#25D36644}
.empty{padding:80px 0;text-align:center;color:#222;font-size:13px}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#1a1a1e;color:#e0e0e0;padding:12px 22px;border-radius:100px;font-size:12px;font-weight:500;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.6);pointer-events:none;white-space:nowrap;border:1px solid #222}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PLATS = [
  {name:"Instagram",color:"#E1306C",bg:"#1a0510",icon:"📸",re:/instagram\.com/i},
  {name:"YouTube",color:"#FF0000",bg:"#150000",icon:"▶️",re:/youtube\.com|youtu\.be/i},
  {name:"TikTok",color:"#69C9D0",bg:"#00100f",icon:"🎵",re:/tiktok\.com/i},
  {name:"Twitter/X",color:"#1DA1F2",bg:"#000d18",icon:"𝕏",re:/twitter\.com|x\.com/i},
  {name:"Twitch",color:"#9146FF",bg:"#0d0020",icon:"🟣",re:/twitch\.tv/i},
  {name:"Spotify",color:"#1DB954",bg:"#001508",icon:"🎧",re:/spotify\.com/i},
  {name:"Pinterest",color:"#E60023",bg:"#150003",icon:"📌",re:/pinterest\.com/i},
  {name:"LinkedIn",color:"#0A66C2",bg:"#000d18",icon:"💼",re:/linkedin\.com/i}
];
var FB = {name:"Web",color:"#555",bg:"#0f0f12",icon:"🔗"};

function dp(url) {
  for (var i=0;i<PLATS.length;i++) if(PLATS[i].re.test(url)) return PLATS[i];
  return FB;
}
function dm(url) {
  try{return new URL(url).hostname.replace("www.","");}catch(e){return url;}
}
function ta(ts) {
  var d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return "ahora";
  if(m<60)return m+"m";
  var h=Math.floor(m/60);
  if(h<24)return h+"h";
  return Math.floor(h/24)+"d";
}
function ytId(url) {
  var m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}
function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

var TC = {};
function fetchThumb(url,id) {
  if(TC[url]){applyT(url,id,TC[url]);return;}
  fetch("https://api.microlink.io/?url="+encodeURIComponent(url)+"&screenshot=false")
    .then(function(r){return r.json();})
    .then(function(d){
      var img=d&&d.data&&d.data.image&&d.data.image.url;
      if(img){TC[url]=img;applyT(url,id,img);}
    }).catch(function(){});
}
function applyT(url,id,img) {
  var el=document.getElementById("t"+id);
  if(el) el.innerHTML='<a href="'+esc(url)+'" target="_blank" rel="noreferrer" style="display:block;width:100%;height:100%"><img style="width:100%;height:100%;object-fit:cover;display:block" src="'+esc(img)+'" loading="lazy" onerror="this.style.display=\'none\'"></a>';
}

var SK="lv5";
function load(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function save(l){try{localStorage.setItem(SK,JSON.stringify(l));}catch(e){}}

var S={
  links:load(),
  input:"",note:"",filter:"all",adding:false,toast:null
};

if(!S.links.length) S.links=[
  {id:1,url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",note:"Tutorial running",platform:dp("https://www.youtube.com/watch?v=dQw4w9WgXcQ"),date:Date.now()-3600000},
  {id:2,url:"https://www.instagram.com/p/example",note:"Inspo foto",platform:dp("https://www.instagram.com/p/example"),date:Date.now()-7200000},
  {id:3,url:"https://www.tiktok.com/@user/video/123",note:"Receta pasta",platform:dp("https://www.tiktok.com/@user/video/123"),date:Date.now()-86400000}
];

var WA_SVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

function render() {
  var links=S.links, input=S.input, note=S.note, filter=S.filter, adding=S.adding, toast=S.toast;
  var prev=input.indexOf("http")===0?dp(input):null;
  var counts={};
  for(var i=0;i<links.length;i++) counts[links[i].platform.name]=(counts[links[i].platform.name]||0)+1;
  var filtered=filter==="all"?links:links.filter(function(l){return l.platform.name===filter;});
  var pills=["all"].concat(PLATS.map(function(p){return p.name;}).filter(function(n){return counts[n];}));
  if(counts["Web"]) pills.push("Web");

  var pillsH=pills.map(function(f){
    var p=null; for(var i=0;i<PLATS.length;i++){if(PLATS[i].name===f){p=PLATS[i];break;}}
    var active=filter===f;
    var cnt=f==="all"?links.length:counts[f];
    var lbl=f==="all"?"Todo &middot; "+links.length:f+" &middot; "+cnt;
    return '<button class="pill'+(active?" active":"")+'" '+(active&&p?'style="background:'+p.color+';color:#fff"':active?'style="background:#f0f0f0;color:#080809"':'')+' onclick="setFilter(\''+f+'\')">'+lbl+'</button>';
  }).join("");

  var cardsH=filtered.length===0?'<div class="empty">Sin links guardados</div>':filtered.map(function(lk){
    var yt=ytId(lk.url);
    var th="";
    if(yt){
      th='<a href="'+esc(lk.url)+'" target="_blank" rel="noreferrer" style="display:block;width:100%;height:100%"><img style="width:100%;height:100%;object-fit:cover;display:block" src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy" onerror="this.style.display=\'none\'"></a>';
    } else if(TC[lk.url]){
      th='<a href="'+esc(lk.url)+'" target="_blank" rel="noreferrer" style="display:block;width:100%;height:100%"><img style="width:100%;height:100%;object-fit:cover;display:block" src="'+esc(TC[lk.url])+'" loading="lazy" onerror="this.style.display=\'none\'"></a>';
    } else {
      th='<span style="font-size:28px">'+lk.platform.icon+'</span>';
      (function(u,id){setTimeout(function(){fetchThumb(u,id);},80);})(lk.url,lk.id);
    }
    var wa="https://wa.me/?text="+encodeURIComponent(lk.url);
    return '<div class="card">'
      +'<div id="t'+lk.id+'" class="thumb" style="background:'+lk.platform.bg+'">'+th+'</div>'
      +'<div class="content">'
        +'<div class="meta"><div class="dot" style="background:'+lk.platform.color+'"></div><span class="pname" style="color:'+lk.platform.color+'">'+lk.platform.name+'</span></div>'
        +'<a class="curl" href="'+esc(lk.url)+'" target="_blank" rel="noreferrer">'+esc(dm(lk.url))+'</a>'
        +(lk.note?'<div class="cnote">'+esc(lk.note)+'</div>':"")
        +'<div class="ctime">'+ta(lk.date)+'</div>'
      +'</div>'
      +'<div class="actions">'
        +'<a class="abtn wa" href="'+esc(wa)+'" target="_blank" rel="noreferrer">'+WA_SVG+'</a>'
        +'<button class="abtn" onclick="copyL(\''+esc(lk.url)+'\')">⎘</button>'
        +'<button class="abtn" onclick="delL('+lk.id+')" style="font-size:14px">✕</button>'
      +'</div>'
    +'</div>';
  }).join("");

  var html='<div class="header"><div><div class="header-sub">Your Vault</div><div class="header-title">Links</div></div>'
    +'<button class="add-btn'+(adding?" open":"")+'" onclick="togAdd()">'+(adding?"✕":"+")+'</button></div>';

  if(adding){
    html+='<div class="add-form">'
      +'<div class="input-wrap"><span class="input-icon">'+(prev?prev.icon:"🔗")+'</span>'
      +'<input class="field" id="ui" type="url" inputmode="url" autocomplete="off" placeholder="Pega tu link aquí..." value="'+esc(input)+'" oninput="setI(this.value)" onkeydown="if(event.key===\'Enter\')addL()" style="border-color:'+(prev?prev.color+"44":"#1a1a1e")+'">'
      +(prev?'<span class="pbadge" style="color:'+prev.color+'">'+prev.name+'</span>':"")
      +'</div>'
      +'<input class="field note" type="text" autocomplete="off" placeholder="Nota (opcional)" value="'+esc(note)+'" oninput="setN(this.value)" onkeydown="if(event.key===\'Enter\')addL()">'
      +'<button class="save-btn" onclick="addL()" style="background:'+(prev?prev.color:"#f0f0f0")+';color:'+(prev?"#fff":"#080809")+'">Guardar</button>'
      +'</div>';
  }

  html+='<div class="filters"><div class="filters-inner">'+pillsH+'</div></div>'
    +'<div class="grid">'+cardsH+'</div>'
    +(toast?'<div class="toast">'+toast+'</div>':"");

  document.getElementById("app").innerHTML=html;
  if(adding){var el=document.getElementById("ui");if(el)setTimeout(function(){el.focus();},50);}
}

function togAdd(){S.adding=!S.adding;render();}
function setFilter(f){S.filter=f;render();}
function setI(v){S.input=v;render();}
function setN(v){S.note=v;render();}

function addL(){
  var url=S.input.trim();
  if(!url)return;
  var lk={id:Date.now(),url:url,note:S.note.trim(),platform:dp(url),date:Date.now()};
  S.links=[lk].concat(S.links);
  save(S.links);
  S.input="";S.note="";S.adding=false;
  toast("✓ Guardado");
  render();
}

function delL(id){
  S.links=S.links.filter(function(l){return l.id!==id;});
  save(S.links);
  render();
}

function copyL(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast("✓ Copiado");});
  } else {
    var t=document.createElement("textarea");
    t.value=url;document.body.appendChild(t);t.select();
    document.execCommand("copy");document.body.removeChild(t);
    toast("✓ Copiado");
  }
}

function toast(msg){
  S.toast=msg;render();
  setTimeout(function(){S.toast=null;render();},2500);
}

render();
</script>
</body>
</html>
