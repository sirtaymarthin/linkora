<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter;background:#f4f6fb;color:#111}

/* HEADER */
.header{padding:20px}
.header h1{font-size:26px}
.header p{color:#777}

/* GRID */
.cat-scroll{
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

/* CARD */
.cat-card{
border-radius:18px;
padding:16px;
height:120px;
display:flex;
flex-direction:column;
justify-content:space-between;
position:relative;
cursor:pointer;
color:#000;
}

/* BADGE */
.badge{
position:absolute;
top:8px;right:8px;
background:#007AFF;
color:#fff;
font-size:11px;
padding:4px 8px;
border-radius:10px;
}

/* DELETE ICON */
.delcat{
position:absolute;
bottom:8px;
right:8px;
background:none;
border:none;
color:#0006;
font-size:14px;
}

/* LINKS */
.link{
background:#fff;
margin:10px;
border-radius:12px;
padding:10px;
cursor:pointer;
}

/* SELECTED */
.sel{
background:#d0e7ff !important;
}

/* FAB */
.fab{
position:fixed;
right:20px;
width:55px;height:55px;
border-radius:50%;
border:none;
color:#fff;
font-size:26px;
}
.add{bottom:30px;background:#007AFF}
.cat{bottom:95px;background:#34C759}

/* VIEW BUTTONS */
.topbar{
padding:10px;
display:flex;
gap:8px;
flex-wrap:wrap;
}

/* ICON PICKER */
.icon-picker{
display:grid;
grid-template-columns:repeat(6,1fr);
gap:8px;
margin-top:10px;
}
.icon{
padding:10px;
background:#eee;
text-align:center;
border-radius:8px;
cursor:pointer;
}
.icon.sel{background:#007AFF;color:#fff}

</style>
</head>

<body>

<div class="header">
<h1>Hello 👋</h1>
<p>Your smart link manager</p>
</div>

<div class="topbar">
<button onclick="setView('big')">Big</button>
<button onclick="setView('small')">Small</button>
<button onclick="setView('list')">List</button>
<button onclick="deleteSelected()">Delete Selected</button>
<button onclick="clearLinks()">Delete All</button>
<button onclick="goBack()">⬅ Back</button>
</div>

<div id="cats" class="cat-scroll"></div>
<div id="links"></div>

<button class="fab add" onclick="openAdd()">＋</button>
<button class="fab cat" onclick="openAddCategory()">📁</button>

<div id="sheet"></div>

<script>

const ICONS=["🎵","🎬","🍳","⚽","💡","✈️","📚","💻","🎮","🎧","📸","⭐","🧠","🏠","🚗","🛍️","🍔","🎨","📱","🧳","🏋️","🎤","📺","📰","💰","🧪","🌍","🐶","🌟","🔥"]

const SK_LINKS="lv_links"
const SK_CATS="lv_cats"

function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d}catch{return d}}
function save(k,v){localStorage.setItem(k,JSON.stringify(v))}

let state={
links:load(SK_LINKS,[]),
cats:load(SK_CATS,[]),
cur:null
}

if(!state.cats.length){
state.cats=[
{id:"music",name:"Music",emoji:"🎵",grad:"linear-gradient(135deg,#a18cd1,#fbc2eb)",parent:null}
]
}

let selected=new Set()
let viewMode=localStorage.getItem("viewMode")||"big"

/* RENDER CATS */
function renderCats(){

let counts={}
state.links.forEach(l=>counts[l.cat]=(counts[l.cat]||0)+1)

let h=""

state.cats.filter(c=>c.parent===state.cur).forEach(c=>{

h+=`
<div class="cat-card" style="background:${c.grad}" onclick="openCat('${c.id}')">

<div style="font-size:26px">${c.emoji}</div>

<div>
<div style="font-weight:700">${c.name}</div>
<div style="font-size:12px;color:#0007">Explore</div>
</div>

${counts[c.id]?`<div class="badge">${counts[c.id]}</div>`:""}

<button class="delcat" onclick="deleteCategory('${c.id}',event)">✕</button>

</div>
`
})

cats.innerHTML=h
}

/* RENDER LINKS */
function renderLinks(){

let list=state.links.filter(l=>l.cat===state.cur)

let h=""

list.forEach(l=>{

h+=`
<div class="link ${selected.has(l.id)?"sel":""}" onclick="toggleSelect(${l.id})">

${viewMode!=="list"?`<div>${l.url}</div>`:""}

${l.note?`<div style="font-size:12px;color:#666">${l.note}</div>`:""}

</div>
`
})

links.innerHTML=h
}

/* NAV */
function openCat(id){
state.cur=id
renderCats()
renderLinks()
}

function goBack(){
let parent = state.cats.find(c=>c.id===state.cur)?.parent || null
state.cur=parent
renderCats()
renderLinks()
}

/* ADD LINK */
function openAdd(){
let url=prompt("Paste link")
if(!url)return

state.links.unshift({
id:Date.now(),
url,
cat:state.cur
})

save(SK_LINKS,state.links)
renderLinks()
renderCats()
}

/* CATEGORY UI */
let pickedIcon=null

function openAddCategory(){

sheet.innerHTML=`
<div style="background:#fff;padding:20px">

<input id="newcat" placeholder="Category name" style="width:100%;padding:10px">

<div class="icon-picker" id="iconpicker"></div>

<button onclick="addCat()">Create</button>

</div>
`

renderIcons()
}

function renderIcons(){
let h=""
ICONS.forEach(i=>{
h+=`<div class="icon" onclick="pick(this,'${i}')">${i}</div>`
})
iconpicker.innerHTML=h
}

function pick(el,i){
document.querySelectorAll(".icon").forEach(e=>e.classList.remove("sel"))
el.classList.add("sel")
pickedIcon=i
}

function addCat(){

let name=document.getElementById("newcat").value.trim()
if(!name||!pickedIcon)return

state.cats.push({
id:"c"+Date.now(),
name,
emoji:pickedIcon,
grad:"linear-gradient(135deg,#a1c4fd,#c2e9fb)",
parent:state.cur
})

save(SK_CATS,state.cats)

sheet.innerHTML=""
renderCats()
}

/* DELETE CAT */
function deleteCategory(id,e){
e.stopPropagation()

if(!confirm("Delete category and all content?"))return

state.cats=state.cats.filter(c=>c.id!==id)
state.links=state.links.filter(l=>l.cat!==id)

save(SK_CATS,state.cats)
save(SK_LINKS,state.links)

renderCats()
renderLinks()
}

/* MULTISELECT */
function toggleSelect(id){
if(selected.has(id))selected.delete(id)
else selected.add(id)
renderLinks()
}

function deleteSelected(){
if(!confirm("Delete selected links?"))return

state.links=state.links.filter(l=>!selected.has(l.id))
selected.clear()

save(SK_LINKS,state.links)

renderLinks()
renderCats()
}

/* DELETE ALL */
function clearLinks(){
if(!confirm("Delete ALL links?"))return

state.links=state.links.filter(l=>l.cat!==state.cur)

save(SK_LINKS,state.links)

renderLinks()
renderCats()
}

/* VIEW MODE */
function setView(v){
viewMode=v
localStorage.setItem("viewMode",v)
renderLinks()
}

renderCats()

</script>

</body>
</html>
