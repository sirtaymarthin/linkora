<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F2F2F7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<title>LinkVault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#F2F2F7;color:#1C1C1E;font-family:'Inter',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
.view{display:none;flex-direction:column;min-height:100vh}
.view.active{display:flex}
.safe-top{height:env(safe-area-inset-top,20px)}
.navbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 8px;background:#F2F2F7;position:sticky;top:0;z-index:20}
.navbar-title{font-size:28px;font-weight:800;color:#1C1C1E;letter-spacing:-0.5px}
.navbar-back{display:flex;align-items:center;gap:6px;font-size:17px;font-weight:600;color:#007AFF;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;padding:4px 0;font-family:'Inter',sans-serif}
.icon-btn{width:36px;height:36px;border-radius:50%;background:#E5E5EA;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;font-size:18px;color:#1C1C1E;font-family:'Inter',sans-serif}
.icon-btn:active{opacity:0.6}
.add-fab{position:fixed;bottom:32px;right:24px;width:56px;height:56px;border-radius:50%;background:#007AFF;color:#FFF;border:none;font-size:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(0,122,255,0.4);z-index:30;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
.add-fab:active{transform:scale(0.93);opacity:0.9}
.home-scroll{flex:1;overflow-y:auto;padding:8px 20px 100px;-webkit-overflow-scrolling:touch}
.cat-card{border-radius:20px;overflow:hidden;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.cat-card:active{opacity:0.9;transform:scale(0.99)}
.cat-card-inner{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between}
.cat-card-left{display:flex;align-items:center;gap:14px}
.cat-card-emoji{font-size:38px;line-height:1}
.cat-card-name{font-size:22px;font-weight:800;color:#FFF;letter-spacing:-0.3px;line-height:1.1}
.cat-card-count{font-size:13px;color:rgba(255,255,255,0.75);font-weight:500;margin-top:2px}
.cat-card-arrow{font-size:22px;color:rgba(255,255,255,0.5)}
.cat-thumbs{display:flex;gap:6px;padding:0 16px 16px}
.cat-thumb-mini{width:72px;height:50px;border-radius:10px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.25)}
.cat-thumb-mini img{width:100%;height:100%;object-fit:cover;display:block}
.cat-thumb-emoji{width:72px;height:50px;border-radius:10px;flex-shrink:0;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:22px}
.detail-scroll{flex:1;overflow-y:auto;padding:8px 16px 100px;-webkit-overflow-scrolling:touch}
.size-picker{display:flex;gap:8px;padding:8px 20px 12px;background:#F2F2F7;position:sticky;top:57px;z-index:10}
.size-btn{flex:1;padding:9px;border-radius:10px;background:#E5E5EA;border:none;font-size:13px;font-weight:600;color:#636366;cursor:pointer;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif}
.size-btn.active{background:#007AFF;color:#FFF}
.size-btn:active{opacity:0.7}
/* SMALL */
.links-list{display:flex;flex-direction:column;gap:10px}
.lcard-s{background:#FFF;border-radius:14px;display:flex;gap:12px;align-items:center;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.lthumb-s{width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;background:#F2F2F7}
.lthumb-s img{width:100%;height:100%;object-fit:contain;display:block}
.linfo{flex:1;min-width:0}
.lplat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:2px}
.lurl{font-size:14px;font-weight:600;color:#1C1C1E;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none;display:block}
.lnote{font-size:12px;color:#8E8E93;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.ltime{font-size:11px;color:#C7C7CC;margin-top:3px}
.lact-col{display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.lbtn{width:34px;height:34px;border-radius:9px;background:#F2F2F7;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;font-size:15px;color:#636366;font-family:'Inter',sans-serif}
.lbtn.wa{background:#E8F8EF}
.lbtn:active{opacity:0.5}
/* MEDIUM */
.links-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.lcard-m{background:#FFF;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.lthumb-m{width:100%;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:32px;background:#F2F2F7}
.lthumb-m img{width:100%;height:100%;object-fit:contain;display:block}
.lbody-m{padding:10px 10px 0}
.lact-row-m{display:flex;gap:5px;padding:8px 10px 10px}
.lbtn2{flex:1;height:32px;border-radius:8px;background:#F2F2F7;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;font-size:15px;color:#636366;font-family:'Inter',sans-serif}
.lbtn2.wa{background:#E8F8EF}
.lbtn2:active{opacity:0.5}
/* LARGE */
.links-grid1{display:flex;flex-direction:column;gap:12px}
.lcard-l{background:#FFF;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.lthumb-l{width:100%;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;background:#F2F2F7}
.lthumb-l img{width:100%;height:100%;object-fit:contain;display:block}
.lbody-l{padding:14px 16px 8px}
.lact-row-l{display:flex;gap:8px;padding:0 16px 14px}
.lbtn3{flex:1;height:42px;border-radius:12px;background:#F2F2F7;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;text-decoration:none;font-size:18px;color:#636366;font-family:'Inter',sans-serif}
.lbtn3.wa{background:#E8F8EF}
.lbtn3:active{opacity:0.5}
/* SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:40;display:flex;align-items:flex-end}
.sheet{background:#FFF;border-radius:24px 24px 0 0;padding:0 0 40px;width:100%;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#C7C7CC;border-radius:2px;margin:10px auto 16px}
.sheet-title{font-size:20px;font-weight:800;color:#1C1C1E;padding:0 20px 14px}
.sfield{width:100%;background:#F2F2F7;border:none;border-radius:12px;padding:15px 16px;font-size:16px;color:#1C1C1E;font-family:'Inter',sans-serif;-webkit-appearance:none;margin-bottom:10px;display:block;font-weight:500}
.sfield:focus{outline:none;background:#E5E5EA}
.sfield::placeholder{color:#C7C7CC}
.scat-label{font-size:12px;font-weight:700;color:#8E8E93;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:block;padding:0 20px}
.scat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 20px;margin-bottom:20px}
.scat{background:#F2F2F7;border:2px solid transparent;border-radius:14px;padding:14px 6px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.scat.sel{border-color:#007AFF;background:#EBF5FF}
.scat .sce{font-size:26px;display:block;margin-bottom:4px}
.scat .scn{font-size:12px;font-weight:600;color:#3C3C43CC}
.scat.sel .scn{color:#007AFF;font-weight:700}
.scat:active{opacity:0.7}
.sheet-save{width:calc(100% - 40px);margin:0 20px;background:#007AFF;color:#FFF;border:none;border-radius:14px;padding:17px;font-size:17px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
.sheet-save:active{opacity:0.8}
.empty-cat{padding:60px 0;text-align:center;color:#C7C7CC;font-size:16px;font-weight:500}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1C1C1E;color:#FFF;padding:12px 24px;border-radius:20px;font-size:15px;font-weight:600;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,0.2);pointer-events:none;white-space:nowrap}
</style>
</head>
<body>

<div class="view active" id="view-home">
  <div class="safe-top"></div>
  <div class="navbar">
    <div class="navbar-title">Links</div>
    <button class="icon-btn" onclick="showSheet()">+</button>
  </div>
  <div class="home-scroll" id="home-scroll"></div>
  <button class="add-fab" onclick="showSheet()">+</button>
</div>

<div class="view" id="view-detail">
  <div class="safe-top"></div>
  <div class="navbar">
    <button class="navbar-back" onclick="goHome()">&#� Links</button>
    <div id="detail-title" style="font-size:17px;font-weight:700"></div>
    <div style="width:60px"></div>
  </div>
  <div class="size-picker">
    <button class="size-btn active" id="sz-s" onclick="setSize('s')">Lista</button>
    <button class="size-btn" id="sz-m" onclick="setSize('m')">Medio</button>
    <button class="size-btn" id="sz-l" onclick="setSize('l')">Grande</button>
  </div>
  <div class="detail-scroll" id="detail-scroll"></div>
</div>

<div id="sheet-el"></div>
<div id="toast-el" style="display:none" class="toast"></div>

<script>
var PLATS=[
  {name:"Instagram",color:"#E1306C",icon:"📸",re:/instagram\.com/i},
  {name:"YouTube",color:"#FF3B30",icon:"▶️",re:/youtube\.com|youtu\.be/i},
  {name:"TikTok",color:"#000",icon:"🎵",re:/tiktok\.com/i},
  {name:"Twitter/X",color:"#1DA1F2",icon:"𝕏",re:/twitter\.com|x\.com/i},
  {name:"Twitch",color:"#9146FF",icon:"🟣",re:/twitch\.tv/i},
  {name:"Spotify",color:"#1DB954",icon:"🎧",re:/spotify\.com/i},
  {name:"Pinterest",color:"#E60023",icon:"📌",re:/pinterest\.com/i},
  {name:"LinkedIn",color:"#0A66C2",icon:"💼",re:/linkedin\.com/i}
];
var FB={name:"Web",color:"#636366",icon:"🔗"};

var DCATS=[
  {id:"musica",  name:"Música",  emoji:"🎵", grad:"linear-gradient(135deg,#FF6B6B,#FF8E53)", color:"#FF6B6B"},
  {id:"videos",  name:"Videos",  emoji:"🎬", grad:"linear-gradient(135deg,#4ECDC4,#44A8F0)", color:"#4ECDC4"},
  {id:"recetas", name:"Recetas", emoji:"🍳", grad:"linear-gradient(135deg,#45B649,#DCE35B)", color:"#45B649"},
  {id:"deporte", name:"Deporte", emoji:"⚽", grad:"linear-gradient(135deg,#667EEA,#764BA2)", color:"#667EEA"},
  {id:"varios",  name:"Varios",  emoji:"📌", grad:"linear-gradient(135deg,#F7971E,#FFD200)", color:"#F7971E"}
];
var GRADS=["linear-gradient(135deg,#f093fb,#f5576c)","linear-gradient(135deg,#4facfe,#00f2fe)","linear-gradient(135deg,#fa709a,#fee140)","linear-gradient(135deg,#a18cd1,#fbc2eb)","linear-gradient(135deg,#ffecd2,#fcb69f)"];
var gIdx=0;

// Re-detect platform from URL (fixes serialization issue)
function dp(url){
  for(var i=0;i<PLATS.length;i++) if(PLATS[i].re.test(url)) return {name:PLATS[i].name,color:PLATS[i].color,icon:PLATS[i].icon};
  return {name:FB.name,color:FB.color,icon:FB.icon};
}
function dm(url){try{return new URL(url).hostname.replace("www.","");}catch(e){return url;}}
function ta(ts){var d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return"ahora";if(m<60)return m+"m";var h=Math.floor(m/60);if(h<24)return h+"h";return Math.floor(h/24)+"d";}
function ytId(url){var m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var TC={};
function fetchThumb(url,id){
  if(TC[url]){applyT(id,TC[url]);return;}
  fetch("https://api.microlink.io/?url="+encodeURIComponent(url)+"&screenshot=false")
    .then(function(r){return r.json();})
    .then(function(d){var img=d&&d.data&&d.data.image&&d.data.image.url;if(img){TC[url]=img;applyT(id,img);}})
    .catch(function(){});
}
function applyT(id,img){
  var el=document.getElementById("th"+id);
  if(el) el.innerHTML='<img style="width:100%;height:100%;object-fit:contain;display:block" src="'+esc(img)+'" loading="lazy" onerror="this.style.display=\'none\'">';
}

var SK="lv10",CK="lv10c";

function load(){
  try{
    var raw=JSON.parse(localStorage.getItem(SK))||[];
    // Re-detect platform for each link to fix serialization
    for(var i=0;i<raw.length;i++) raw[i].platform=dp(raw[i].url);
    return raw;
  }catch(e){return[];}
}
function loadC(){try{var c=JSON.parse(localStorage.getItem(CK));return c&&c.length?c:DCATS.slice();}catch(e){return DCATS.slice();}}
function save(l){
  try{
    // Save without platform (re-detected on load)
    var toSave=l.map(function(x){return {id:x.id,url:x.url,note:x.note,category:x.category,date:x.date};});
    localStorage.setItem(SK,JSON.stringify(toSave));
  }catch(e){}
}
function saveC(c){try{localStorage.setItem(CK,JSON.stringify(c));}catch(e){}}

var S={links:load(),cats:loadC(),selCat:"musica",curCat:null,size:"s"};

if(!S.links.length) S.links=[
  {id:1,url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",note:"Tutorial running",platform:dp("https://www.youtube.com/watch?v=dQw4w9WgXcQ"),category:"deporte",date:Date.now()-3600000},
  {id:2,url:"https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M",note:"Lista entreno",platform:dp("https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M"),category:"musica",date:Date.now()-7200000},
  {id:3,url:"https://www.tiktok.com/@user/video/123",note:"Receta pasta",platform:dp("https://www.tiktok.com/@user/video/123"),category:"recetas",date:Date.now()-86400000}
];

function getCat(id){for(var i=0;i<S.cats.length;i++)if(S.cats[i].id===id)return S.cats[i];return DCATS[4];}

var WA='<svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

function mkThumb(lk, cls) {
  var yt=ytId(lk.url);
  var inner;
  if(yt){
    inner='<img style="width:100%;height:100%;object-fit:contain;display:block" src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy" onerror="this.style.display=\'none\'">';
  } else if(TC[lk.url]){
    inner='<img style="width:100%;height:100%;object-fit:contain;display:block" src="'+esc(TC[lk.url])+'" loading="lazy" onerror="this.style.display=\'none\'">';
  } else {
    inner='<span style="font-size:'+(cls==='lthumb-l'?'44':cls==='lthumb-s'?'26':'32')+'px">'+lk.platform.icon+'</span>';
    (function(u,id){setTimeout(function(){fetchThumb(u,id);},80);})(lk.url,lk.id);
  }
  return '<div id="th'+lk.id+'" class="'+cls+'">'+inner+'</div>';
}

function renderHome(){
  var counts={};
  for(var i=0;i<S.links.length;i++) counts[S.links[i].category]=(counts[S.links[i].category]||0)+1;
  var html="";
  for(var i=0;i<S.cats.length;i++){
    var cat=S.cats[i];
    var cnt=counts[cat.id]||0;
    var catLinks=S.links.filter(function(l){return l.category===cat.id;}).slice(0,4);
    var thumbsH="";
    if(catLinks.length){
      thumbsH='<div class="cat-thumbs">';
      for(var j=0;j<catLinks.length;j++){
        var lk=catLinks[j];
        var yt=ytId(lk.url);
        if(yt){
          thumbsH+='<div class="cat-thumb-mini"><img src="https://img.youtube.com/vi/'+yt+'/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover;display:block"></div>';
        } else if(TC[lk.url]){
          thumbsH+='<div class="cat-thumb-mini"><img src="'+esc(TC[lk.url])+'" style="width:100%;height:100%;object-fit:cover;display:block"></div>';
        } else {
          thumbsH+='<div class="cat-thumb-emoji">'+lk.platform.icon+'</div>';
          (function(u,id){setTimeout(function(){fetchThumb(u,id);},300);})(lk.url,lk.id);
        }
      }
      thumbsH+='</div>';
    }
    html+='<div class="cat-card" onclick="openCat(\''+cat.id+'\')" style="background:'+cat.grad+'">'
      +'<div class="cat-card-inner">'
        +'<div class="cat-card-left">'
          +'<span class="cat-card-emoji">'+cat.emoji+'</span>'
          +'<div>'
            +'<div class="cat-card-name">'+cat.name+'</div>'
            +'<div class="cat-card-count">'+cnt+' '+(cnt===1?'link':'links')+'</div>'
          +'</div>'
        +'</div>'
        +'<span class="cat-card-arrow">›</span>'
      +'</div>'
      +thumbsH
    +'</div>';
  }
  if(!html) html='<div style="padding:60px 0;text-align:center;color:#C7C7CC;font-size:16px">Pulsa + para añadir links</div>';
  document.getElementById("home-scroll").innerHTML=html;
}

function renderDetail(){
  var cat=getCat(S.curCat);
  document.getElementById("detail-title").textContent=cat.emoji+" "+cat.name;
  var links=S.links.filter(function(l){return l.category===S.curCat;});
  if(!links.length){
    document.getElementById("detail-scroll").innerHTML='<div class="empty-cat">Sin links en esta categoría</div>';
    return;
  }
  var html="";
  if(S.size==="s"){
    html='<div class="links-list">';
    for(var i=0;i<links.length;i++){
      var lk=links[i];
      var wa="https://wa.me/?text="+encodeURIComponent(lk.url);
      html+='<div class="lcard-s">'
        +mkThumb(lk,"lthumb-s")
        +'<div class="linfo">'
          +'<div class="lplat" style="color:'+lk.platform.color+'">'+lk.platform.name+'</div>'
          +'<a class="lurl" href="'+esc(lk.url)+'" target="_blank" rel="noreferrer">'+esc(dm(lk.url))+'</a>'
          +(lk.note?'<div class="lnote">'+esc(lk.note)+'</div>':"")
          +'<div class="ltime">'+ta(lk.date)+'</div>'
        +'</div>'
        +'<div class="lact-col">'
          +'<a class="lbtn wa" href="'+esc(wa)+'" target="_blank" rel="noreferrer">'+WA+'</a>'
          +'<button class="lbtn" onclick="copyL(\''+esc(lk.url)+'\')" style="font-size:16px">⎘</button>'
          +'<button class="lbtn" onclick="delL('+lk.id+')" style="color:#FF3B30">✕</button>'
        +'</div>'
      +'</div>';
    }
    html+='</div>';
  } else if(S.size==="m"){
    html='<div class="links-grid2">';
    for(var i=0;i<links.length;i++){
      var lk=links[i];
      var wa="https://wa.me/?text="+encodeURIComponent(lk.url);
      html+='<div class="lcard-m">'

          +'<a class="lbtn2 wa" .sheet-title{font-size:20px;font-weight:800;color:#1C1C1E;padding:0 20px;margin-bottom:16px}

<script>
var PLATS=[
  {name:"Instagram",color:"#E1306C",re:/instagram\.com/i,icon:"📸"},
  {name:"YouTube",color:"#FF3B30",re:/youtube\.com|youtu\.be/i,icon:"▶️"},
  {name:"TikTok",color:"#000",re:/tiktok\.com/i,icon:"🎵"},
  {name:"Twitter/X",color:"#1DA1F2",re:/twitter\.com|x\.com/i,icon:"𝕏"},
  {name:"Twitch",color:"#9146FF",re:/twitch\.tv/i,icon:"🟣"},
  {name:"Spotify",color:"#1DB954",re:/spotify\.com/i,icon:"🎧"},
  {name:"Pinterest",color:"#E60023",re:/pinterest\.com/i,icon:"📌"},
  {name:"LinkedIn",color:"#0A66C2",re:/linkedin\.com/i,icon:"💼"}
];
var FB={name:"Web",color:"#636366",icon:"🔗"};

var DEFAULT_CATS=[
  {id:"musica",  name:"Música",  emoji:"🎵", grad:"linear-gradient(135deg,#FF6B6B,#FF8E53)", color:"#FF6B6B"},
  {id:"videos",  name:"Videos",  emoji:"🎬", grad:"linear-gradient(135deg,#4ECDC4,#44A8F0)", color:"#4ECDC4"},
  {id:"recetas", name:"Recetas", emoji:"🍳", grad:"linear-gradient(135deg,#45B649,#DCE35B)", color:"#45B649"},
  {id:"deporte", name:"Deporte", emoji:"⚽", grad:"linear-gradient(135deg,#667EEA,#764BA2)", color:"#667EEA"},
  {id:"varios",  name:"Varios",  emoji:"📌", grad:"linear-gradient(135deg,#F7971E,#FFD200)", color:"#F7971E"}
];
var GRAD_POOL=["linear-gradient(135deg,#f093fb,#f5576c)","linear-gradient(135deg,#4facfe,#00f2fe)","linear-gradient(135deg,#fa709a,#fee140)","linear-gradient(135deg,#a18cd1,#fbc2eb)","linear-gradient(135deg,#ffecd2,#fcb69f)"];
var gIdx=0;

function dp(url){for(var i=0;i<PLATS.length;i++)if(PLATS[i].re.test(url))return PLATS[i];return FB;}
function dm(url){try{return new URL(url).hostname.replace("www.","");}catch(e){return url;}}
function ta(ts){var d=Date.now()-ts,m=Math.floor(d/60000);if(m<1)return"ahora";if(m<60)return m+"m";var h=Math.floor(m/60);if(h<24)return h+"h";return Math.floor(h/24)+"d";}
function ytId(url){var m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

var TC={};
function fetchThumb(url,id,cb){
  if(TC[url]){if(cb)cb(TC[url]);applyT(id,TC[url]);return;}
  fetch("https://api.microlink.io/?url="+encodeURIComponent(url)+"&screenshot=false")
    .then(function(r){return r.json();})
    .then(function(d){var img=d&&d.data&&d.data.image&&d.data.image.url;if(img){TC[url]=img;if(cb)cb(img);applyT(id,img);}})
    .catch(function(){});
}
function applyT(id,img){
  var el=document.getElementById("th"+id);
  if(el){el.innerHTML='<img style="width:100%;height:100%;object-fit:contain;display:block" src="'+esc(img)+'" loading="lazy" onerror="this.style.display=\'none\'">';}
}

var SK="lv9",CK="lv9c";
function load(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function loadC(){try{var c=JSON.parse(localStorage.getItem(CK));return c&&c.length?c:DEFAULT_CATS.slice();}catch(e){return DEFAULT_CATS.slice();}}
function save(l){try{localStorage.setItem(SK,JSON.stringify(l));}catch(e){}}
function saveC(c){try{localStorage.setItem(CK,JSON.stringify(c));}catch(e){}}

var S={
  links:load(),cats:loadC(),
  selCat:"musica",
  curCat:null,
  size:"s",
  sheet:false
};
if(!S.links.length) S.links=[
  {id:1,url:"https://www.youtube.com/watch?v=dQw4w9WgXcQ",note:"Tutorial running",platform:dp("https://www.youtube.com/watch?v=dQw4w9WgXcQ"),category:"deporte",date:Date.now()-3600000},
  {id:2,url:"https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M",note:"Lista entreno",platform:dp("https://open.spotify.com/playlist/37i9dQZF1DXcBWIGoYBM5M"),category:"musica",date:Date.now()-7200000},
  {id:3,url:"https://www.tiktok.com/@user/video/123",note:"Receta pasta",platform:dp("https://www.tiktok.com/@user/video/123"),category:"recetas",date:Date.now()-86400000}
];
function getCat(id){for(var i=0;i<S.cats.length;i++)if(S.cats[i].id===id)return S.cats[i];return DEFAULT_CATS[4];}

var WA='<svg width="18" height="18" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>';

// ── THUMB HELPER ──────────────────────────────────────────────────────────────
function thumbHtml(lk, cls, bg) {
  var yt=ytId(lk.url);
  var inner="";
  if(yt){
    inner='<img style="width:100%;height:100%;object-fit:contain;display:block" src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy" onerror="this.style.display=\'none\'">';
  } else if(TC[lk.url]){
    inner='<img style="width:100%;height:100%;object-fit:contain;display:block" src="'+esc(TC[lk.url])+'" loading="lazy" onerror="this.style.display=\'none\'">';
  } else {
    inner='<span style="font-size:'+(cls==='lthumb3'?'44':'cls'==='lthumb'?'24':'32')+'px">'+lk.platform.icon+'</span>';
    (function(u,id){setTimeout(function(){fetchThumb(u,id);},80);})(lk.url,lk.id);
  }
  return '<div id="th'+lk.id+'" class="'+cls+'" style="background:'+bg+'">'+inner+'</div>';
}

// ── HOME ──────────────────────────────────────────────────────────────────────
function renderHome(){
  var counts={};
  for(var i=0;i<S.links.length;i++) counts[S.links[i].category]=(counts[S.links[i].category]||0)+1;
  var html="";
  for(var i=0;i<S.cats.length;i++){
    var cat=S.cats[i];
    var cnt=counts[cat.id]||0;
    // preview thumbs
    var catLinks=S.links.filter(function(l){return l.category===cat.id;}).slice(0,4);
    var thumbsHtml="";
    if(catLinks.length){
      thumbsHtml='<div class="cat-thumbs">';
      for(var j=0;j<catLinks.length;j++){
        var lk=catLinks[j];
        var yt=ytId(lk.url);
        if(yt){
          thumbsHtml+='<div class="cat-thumb-mini"><img src="https://img.youtube.com/vi/'+yt+'/mqdefault.jpg" style="width:100%;height:100%;object-fit:cover"></div>';
        } else if(TC[lk.url]){
          thumbsHtml+='<div class="cat-thumb-mini"><img src="'+esc(TC[lk.url])+'" style="width:100%;height:100%;object-fit:cover"></div>';
        } else {
          thumbsHtml+='<div class="cat-thumb-mini-emoji">'+lk.platform.icon+'</div>';
          (function(u,id){setTimeout(function(){fetchThumb(u,id);},200);})(lk.url,lk.id);
        }
      }
      thumbsHtml+='</div>';
    }
    html+='<div class="cat-card" onclick="openCat(\''+cat.id+'\')" style="background:'+cat.grad+'">'
      +'<div class="cat-card-inner">'
        +'<div class="cat-card-left">'
          +'<span class="cat-card-emoji">'+cat.emoji+'</span>'
          +'<div class="cat-card-info">'
            +'<div class="cat-card-name">'+cat.name+'</div>'
            +'<div class="cat-card-count">'+cnt+' '+(cnt===1?'link':'links')+'</div>'
          +'</div>'
        +'</div>'
        +'<span class="cat-card-arrow">›</span>'
      +'</div>'
      +thumbsHtml
    +'</div>';
  }
  if(!html) html='<div style="padding:60px 0;text-align:center;color:#C7C7CC;font-size:16px">Sin categorías</div>';
  document.getElementById("home-scroll").innerHTML=html;
}

// ── DETAIL ────────────────────────────────────────────────────────────────────
function renderDetail(){
  var cat=getCat(S.curCat);
  document.getElementById("detail-title").textContent=cat.emoji+" "+cat.name;
  var links=S.links.filter(function(l){return l.category===S.curCat;});
  var html="";
  if(!links.length){
    html='<div class="empty-cat">Sin links en esta categoría</div>';
  } else if(S.size==="s"){
    html='<div class="links-list">';
    for(var i=0;i<links.length;i++){
      var lk=links[i];
      var yt=ytId(lk.url);
      var tInner=yt?'<img style="width:100%;height:100%;object-fit:contain" src="https://img.youtube.com/vi/'+yt+'/mqdefault.jpg" loading="lazy">':TC[lk.url]?'<img style="width:100%;height:100%;object-fit:contain" src="'+esc(TC[lk.url])+'" loading="lazy" onerror="this.style.display=\'none\'">':lk.platform.icon;
      if(!yt&&!TC[lk.url])(function(u,id){set  var catCounts={},platCounts={};
  for(var i=0;i<links.length;i++){
    catCounts[links[i].category]=(catCounts[links[i].category]||0)+1;
    platCounts[links[i].platform.name]=(platCounts[links[i].platform.name]||0)+1;
  }
  var filtered=links.filter(function(l){
    if(filter==="all")return true;
    if(tab==="cat")return l.category===filter;
    return l.platform.name===filter;
  });

  var catPills=["all"].concat(S.cats.map(function(c){return c.id;}).filter(function(id){return catCounts[id];}));
  var platPills=["all"].concat(PLATS.map(function(p){return p.name;}).filter(function(n){return platCounts[n];}));
  var activePills=tab==="cat"?catPills:platPills;

  var pillsH=activePills.map(function(f){
    var cat=null;for(var i=0;i<S.cats.length;i++){if(S.cats[i].id===f){cat=S.cats[i];break;}}
    var plat=null;for(var i=0;i<PLATS.length;i++){if(PLATS[i].name===f){plat=PLATS[i];break;}}
    var active=filter===f;
    var cnt=f==="all"?links.length:(tab==="cat"?catCounts[f]:platCounts[f]);
    var lbl=f==="all"?"Todo "+links.length:(cat?cat.emoji+" "+cat.name:f)+" "+cnt;
    var bg=active?(cat?cat.color:plat?plat.color:"#1C1C1E"):"#FFF";
    return '<button class="pill'+(active?" active":"")+'" style="'+(active?"background:"+bg+";":"")+'color:'+(active?"#FFF":"#8E8E93")+'" onclick="setFilter(\''+f+'\')">'+lbl+'</button>';
  }).join("");

  var cardsH=filtered.length===0?'<div class="empty">Sin links guardados</div>':filtered.map(function(lk){
    var yt=ytId(lk.url),th="",cat=getCat(lk.category);
    var grad=cat.grad||"linear-gradient(135deg,#667EEA,#764BA2)";
    if(yt){
      th='<a href="'+esc(lk.url)+'" target="_blank" rel="noreferrer" style="display:block;width:100%;height:120px"><img style="width:100%;height:100%;object-fit:cover;display:block" src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy" onerror="this.parentElement.outerHTML=\'<div class=card-thumb-placeholder style=background:'+encodeURIComponent(grad)+'>\'+ lk.platform.icon +\'</div>\'"></a>';
    } else if(TC[lk.url]){
      th='<a href="'+esc(lk.url)+'" target="_blank" rel="noreferrer" style="display:block;width:100%;height:120px"><img style="width:100%;height:100%;object-fit:cover;display:block" src="'+esc(TC[lk.url])+'" loading="lazy" onerror="this.style.display=\'none\'"></a>';
    } else {
      th='<div id="t'+lk.id+'" class="card-thumb-placeholder" style="background:'+grad+'">'+lk.platform.icon+'</div>';
      (function(u,id){setTimeout(function(){fetchThumb(u,id);},80);})(lk.url,lk.id);
    }
    var wa="https://wa.me/?text="+encodeURIComponent(lk.url);
    return '<div class="card" style="background:'+grad+'">'
      +th
      +'<div class="card-body" style="background:#FFF">'
        +'<span class="card-platform" style="color:'+lk.platform.color+'">'+lk.platform.name+'</span>'
        +'<a class="card-url" href="'+esc(lk.url)+'" target="_blank" rel="noreferrer">'+esc(dm(lk.url))+'</a>'
        +(lk.note?'<div class="card-note">'+esc(lk.note)+'</div>':"")
        +'<div class="card-time">'+ta(lk.date)+'</div>'
      +'</div>'
      +'<div class="card-actions" style="background:'+grad+'">'
        +'<a class="abtn" href="'+esc(wa)+'" target="_blank" rel="noreferrer">'+WA_SVG+'</a>'
        +'<button class="abtn" onclick="copyL(\''+esc(lk.url)+'\')" style="font-size:18px">⎘</button>'
        +'<button class="abtn" onclick="delL('+lk.id+')" style="font-size:16px">✕</button>'
      +'</div>'
    +'</div>';
  }).join("");

  var catGridH=S.cats.map(function(c){
    var sel=S.selCat===c.id;
    return '<div class="cat-opt'+(sel?" sel":"")+'" onclick="selCat(\''+c.id+'\')" style="'+(sel?"background:"+c.grad+";":"background:#F2F2F7;")+'">'
      +'<span class="ce">'+c.emoji+'</span><span class="cn" style="'+(sel?"color:#FFF":"")+'">'+c.name+'</span></div>';
  }).join("")
  +'<div class="cat-opt" onclick="addCustomCat()"><span class="ce">✏️</span><span class="cn">Nueva</span></div>';

  var html='<div class="header">'
    +'<div class="header-row"><div class="header-title">Links</div>'
    +'<button class="add-btn'+(adding?" open":"")+'" onclick="togAdd()">'+(adding?"✕":"+")+'</button></div>'
    +'<div class="header-sub">'+links.length+' guardados</div>'
    +'</div>';

  if(adding){
    html+='<div style="padding:0 20px 16px">'
      +'<div class="add-form">'
        +'<input class="field" id="ui" type="url" inputmode="url" autocomplete="off" placeholder="Pega tu link aquí...">'
        +'<input class="field" id="ni" type="text" autocomplete="off" placeholder="Nota (opcional)">'
        +'<span class="cat-label">Categoría</span>'
        +'<div class="cat-grid">'+catGridH+'</div>'
        +'<button class="save-btn" onclick="addL()">Guardar</button>'
      +'</div>'
    +'</div>';
  }

  html+='<div class="tabs">'
    +'<div class="tab'+(tab==="cat"?" active":"")+'" onclick="setTab(\'cat\')">Categorías</div>'
    +'<div class="tab'+(tab==="plat"?" active":"")+'" onclick="setTab(\'plat\')">Plataformas</div>'
    +'</div>'
    +'<div class="filters"><div class="filters-inner">'+pillsH+'</div></div>'
    +'<div class="grid">'+cardsH+'</div>'
    +(toast?'<div class="toast">'+toast+'</div>':"");

  document.getElementById("app").innerHTML=html;
}

function togAdd(){S.adding=!S.adding;render();}
function setTab(t){S.tab=t;S.filter="all";render();}
function setFilter(f){S.filter=f;render();}
function selCat(id){S.selCat=id;render();}

function addCustomCat(){
  var modal=document.getElementById("modal");
  modal.style.display="flex";
  modal.innerHTML='<div class="modal-bg" onclick="closeModal()">'
    +'<div class="modal" onclick="event.stopPropagation()">'
      +'<h3>Nueva categoría</h3>'
      +'<input class="field" id="cat-emoji" placeholder="Emoji (ej: 🎸)" style="margin-bottom:10px">'
      +'<input class="field" id="cat-name" placeholder="Nombre (ej: Guitarra)">'
      +'<div class="modal-btns">'
        +'<button class="mbtn sec" onclick="closeModal()">Cancelar</button>'
        +'<button class="mbtn primary" onclick="saveCustomCat()">Crear</button>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("modal").innerHTML="";
}

function saveCustomCat(){
  var emoji=document.getElementById("cat-emoji").value.trim()||"📁";
  var name=document.getElementById("cat-name").value.trim();
  if(!name)return;
  var id="c_"+Date.now();
  var grad=GRAD_POOL[gradIdx%GRAD_POOL.length];gradIdx++;
  var color="#667EEA";
  S.cats.push({id:id,name:name,emoji:emoji,color:color,grad:grad});
  saveCats(S.cats);
  S.selCat=id;
  closeModal();
  render();
}

function addL(){
  var url=document.getElementById("ui").value.trim();
  var note=document.getElementById("ni").value.trim();
  if(!url)return;
  var lk={id:Date.now(),url:url,note:note,platform:dp(url),category:S.selCat,date:Date.now()};
  S.links=[lk].concat(S.links);
  save(S.links);
  S.adding=false;
  var cat=getCat(S.selCat);
  toast("✓ Guardado · "+cat.emoji+" "+cat.name);
  render();
}

function delL(id){
  S.links=S.links.filter(function(l){return l.id!==id;});
  save(S.links);
  render();
}

function copyL(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast("✓ Copiado");});
  } else {
    var t=document.createElement("textarea");
    t.value=url;document.body.appendChild(t);t.select();
    document.execCommand("copy");document.body.removeChild(t);
    toast("✓ Copiado");
  }
}

function toast(msg){
  S.toast=msg;render();
  setTimeout(function(){S.toast=null;render();},2500);
}

render();
</script>
